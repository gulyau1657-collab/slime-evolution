name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          libffi-dev \
          libssl-dev \
          zip \
          unzip \
          ccache

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer==1.5.0 cython==0.29.36

    - name: Make buildozer.spec executable
      run: chmod +x buildozer.spec || true

    - name: Build APK
      run: |
        yes | buildozer android debug || buildozer android debug

    - name: List build output
      if: always()
      run: |
        echo "=== Listing bin/ directory ==="
        ls -lah bin/ || echo "bin/ not found"
        echo "=== Listing .buildozer/ ==="
        ls -lah .buildozer/ || echo ".buildozer/ not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: slime-evolution-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/android/platform/build-*/logs/
          .buildozer/android/platform/python-for-android/
        retention-days: 7
